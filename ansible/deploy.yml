- hosts: servers
  become: true

  tasks:

    - name: Stop old container
      command: docker stop ticket-container
      ignore_errors: yes

    - name: Remove old container
      command: docker rm ticket-container
      ignore_errors: yes

    - name: Pull latest Docker image from DockerHub
      command: docker pull blanck21/ticket-reservation:latest

    - name: Run new container
      command: docker run -d -p 2080:2080 --name ticket-container blanck21/ticket-reservation:latest